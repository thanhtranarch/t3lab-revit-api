title: Align Positions
tooltip: Snap element positions to nearest 5 or 10 mm relative to a reference element
description: |
  Align Positions snaps surrounding elements so their distance to a
  reference element (Grid, Wall or Column) is a clean multiple of 5 or 10 mm.

  Workflow:
  1. Pick a reference element (Grid, Wall, Column)
  2. Select surrounding elements to check
  3. Review distances in the preview table
  4. Apply corrections

author: Tran Tien Thanh
version: 1.0.0
